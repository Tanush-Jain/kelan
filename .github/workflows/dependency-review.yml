name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Only runs on PRs — skipped on direct pushes (no diff to review)
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on high/critical severity new dependencies with known CVEs
          fail-on-severity: high
          # Allow GPL-compatible licences for open-source project
          allow-licenses: Apache-2.0, MIT, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0, LGPL-2.1, Python-2.0, PSF-2.0
          # Leave a summary comment on the PR
          comment-summary-in-pr: always
