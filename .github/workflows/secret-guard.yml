name: Secret Guard

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  secret-guard:
    name: Block Secrets & Env Files
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block committed secret files
        run: |
          CHANGED=$(git diff --diff-filter=d --name-only HEAD~1 HEAD 2>/dev/null || git diff --diff-filter=d --name-only HEAD 2>/dev/null || true)
          if echo "$CHANGED" | grep -qE "^\.env$|^\.env\..*|agent-identity\.key|secrets/|credentials/|certs/|\.pem$|\.key$|\.crt$|\.pfx$|\.db$|\.sqlite$|\.sqlite3$|^\.git\.backup/"; then
            echo "::error::🚫 Attempted to commit a sensitive/secret file:"
            echo "$CHANGED" | grep -E "^\.env$|^\.env\..*|agent-identity\.key|secrets/|credentials/|certs/|\.pem$|\.key$|\.crt$|\.pfx$|\.db$|\.sqlite$|\.sqlite3$|^\.git\.backup/"
            exit 1
          fi
          echo "✅ No secret files committed"

      - name: Scan for hardcoded API keys
        run: |
          FAILED=0
          # Google / GCP API keys
          if grep -rn -E "AIza[0-9A-Za-z_-]{35}" \
              --include="*.rs" --include="*.py" --include="*.sh" \
              --include="*.ts" --include="*.js" \
              --exclude-dir=".git" --exclude-dir=".github" --exclude-dir="target" --exclude-dir="venv" \
              . 2>/dev/null; then
            echo "::error::🚫 Hardcoded Google API key detected"
            FAILED=1
          fi
          # Hardcoded Grafana passwords (non-env-var values)
          if grep -rn -E "GF_SECURITY_ADMIN_PASSWORD=[a-zA-Z0-9]" \
              --include="*.yml" --include="*.yaml" \
              --exclude-dir=".git" --exclude-dir=".github" . 2>/dev/null; then
            echo "::error::🚫 Hardcoded Grafana password detected (use \${GRAFANA_PASSWORD})"
            FAILED=1
          fi
          # AWS Access Keys
          if grep -rn -E "AKIA[0-9A-Z]{16}" \
              --include="*.rs" --include="*.py" \
              --exclude-dir=".git" --exclude-dir=".github" --exclude-dir="target" . 2>/dev/null; then
            echo "::error::🚫 AWS Access Key detected"
            FAILED=1
          fi
          # Private keys in source files
          if grep -rn -E "BEGIN.*PRIVATE KEY|BEGIN RSA PRIVATE" \
              --include="*.rs" --include="*.py" --include="*.ts" \
              --include="*.js" \
              --exclude-dir=".git" --exclude-dir=".github" --exclude-dir="target" --exclude-dir="venv" \
              . 2>/dev/null; then
            echo "::error::🚫 Private key material detected in source files"
            FAILED=1
          fi
          if [ $FAILED -eq 1 ]; then exit 1; fi
          echo "✅ No hardcoded secrets found"

      - name: TruffleHog deep scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true
